<body>

<main id="main" class="wrap" style="padding-top:44px;padding-bottom:88px">
  <p class="eyebrow">SAVED</p>
  <h1 class="h1" style="margin-bottom:36px">Your collection</h1>

  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:36px" id="folderBar"></div>

  <div class="grid-3" id="itemsGrid"></div>
  <div class="empty-state" id="emptyState" hidden>
    <h3 class="h3">Nothing here yet</h3>
    <p style="margin:10px 0 22px">Save recipes and articles with the bookmark button, they'll show up here.</p>
    <a class="btn" href="recipes.html">Browse recipes</a>
  </div>
</main>

<footer class="footer">
  <div class="wrap">
    <div class="footer-bottom" style="border:none">© 2026 gimme, made with love (and a lot of kimchi)</div>
  </div>
</footer>

<script src="assets/js/data.js?v=14"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="assets/js/app.js?v=14"></script>
<script>
  Gimme.requireAuth();
  let activeFolder = 'all';

  function resolveItem(key) {
    const [type, id] = key.split(':');
    if (type === 'recipe') {
      const r = Gimme.recipeById(Number(id));
      return r && { kind: 'recipe', data: r };
    }
    const a = ARTICLES.find(x => x.slug === id);
    return a && { kind: 'article', data: a };
  }

  function articleCard(a) {
    return `
      <a class="card" href="article.html?slug=${a.slug}" style="text-decoration:none;color:inherit">
        <div class="card-body">
          <div class="card-row">
            <span class="pill tag ${a.category === 'lifestyle' ? 'neutral' : a.category}">${a.category.replace('-', ' ').toUpperCase()}</span>
            <span style="font:600 12px var(--font-head);opacity:.5">${a.readTime}</span>
          </div>
          <div class="card-title">${a.title}</div>
          <p class="card-excerpt">${a.excerpt}</p>
          <span style="font:700 13px var(--font-head);color:var(--accent);margin-top:auto">Read article →</span>
        </div>
      </a>`;
  }

  function render() {
    const s = Gimme.getSaved();
    const counts = {};
    Object.entries(s.items).forEach(([key, folders]) => folders.forEach(f => counts[f] = (counts[f] || 0) + 1));

    document.getElementById('folderBar').innerHTML = `
      <button class="filter-chip ${activeFolder === 'all' ? 'on' : ''}" data-folder="all">All items (${Object.keys(s.items).length})</button>
      ${s.folders.map(f => `
        <button class="filter-chip ${activeFolder === f.id ? 'on' : ''}" data-folder="${f.id}">${f.name} (${counts[f.id] || 0})</button>`).join('')}`;
    document.querySelectorAll('[data-folder]').forEach(b =>
      b.addEventListener('click', () => { activeFolder = b.dataset.folder; render(); }));

    const keys = Object.entries(s.items)
      .filter(([key, folders]) => activeFolder === 'all' || folders.includes(activeFolder))
      .map(([key]) => key);

    const grid = document.getElementById('itemsGrid');
    grid.innerHTML = keys.map(key => {
      const item = resolveItem(key);
      if (!item) return '';
      return item.kind === 'recipe' ? Gimme.recipeCard(item.data) : articleCard(item.data);
    }).join('');
    Gimme.bindSaveButtons(grid);
    document.getElementById('emptyState').hidden = keys.length > 0;
  }

  (async () => { await Gimme.pullSavedFromCloud(); render(); })();
</script>
</body>
</html>
