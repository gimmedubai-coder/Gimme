<script src="assets/js/app.js?v=15"></script>
<script>
  const CATS = [['all', 'All'], ['gut', 'Gut Health'], ['hormone', 'Hormone Balance'], ['protein', 'High Protein'], ['lifestyle', 'Lifestyle']];
  let activeCat = new URLSearchParams(location.search).get('cat') || 'all';

  const featured = ARTICLES.find(a => a.slug === 'feeling-good-meaning');
  document.getElementById('featuredCard').href = 'article.html?slug=' + featured.slug;
  document.getElementById('featuredCard').innerHTML = `
    <img src="assets/img/about-team.jpg" alt="Samy and Renske cooking together" loading="lazy">
    <div class="featured-body">
      <div class="card-row" style="justify-content:flex-start;gap:10px">
        <span class="pill tag neutral">FEATURED</span>
        <span style="font:600 12px var(--font-head);opacity:.5">${featured.readTime}</span>
      </div>
      <h2 class="h2" style="margin:14px 0 10px">${featured.title}</h2>
      <p style="opacity:.65;margin:0 0 20px">${featured.excerpt}</p>
      <span style="font:700 14px var(--font-head);color:var(--accent)">Read article →</span>
    </div>`;

  function catLabel(c) { return (CATS.find(([k]) => k === c) || [null, c])[1]; }

  function renderChips() {
    document.getElementById('chips').innerHTML = CATS.map(([k, label]) =>
      `<button class="filter-chip ${k === activeCat ? 'on' : ''}" data-cat="${k}">${label}</button>`).join('');
    document.querySelectorAll('[data-cat]').forEach(b =>
      b.addEventListener('click', () => { activeCat = b.dataset.cat; renderChips(); renderGrid(); }));
  }

  function renderGrid() {
    const list = ARTICLES.filter(a => activeCat === 'all' || a.category === activeCat);
    document.getElementById('articleGrid').innerHTML = list.map(a => `
      <a class="card" href="article.html?slug=${a.slug}" style="text-decoration:none;color:inherit">
        <div class="card-body">
          <div class="card-row">
            <span class="pill tag ${a.category === 'lifestyle' ? 'neutral' : a.category}">${a.category.replace('-', ' ').toUpperCase()}</span>
            <span style="font:600 12px var(--font-head);opacity:.5">${a.readTime}</span>
          </div>
          <div class="card-title">${a.title}</div>
          <p class="card-excerpt">${a.excerpt}</p>
          <span style="font:700 13px var(--font-head);color:var(--accent);margin-top:auto">Read article →</span>
        </div>
      </a>`).join('');
  }

  renderChips(); renderGrid();
</script>
